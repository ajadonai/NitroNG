<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Email Signature — Adonai Jonathan</title>
<link rel="icon" href="/favicon-v2.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon-v2.png">
<style>
  body { margin: 40px; background: #f7f7f7; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; font-family: -apple-system, system-ui, sans-serif; }
  .wrapper { background: #fff; padding: 48px; border-radius: 16px; box-shadow: 0 2px 24px rgba(0,0,0,.06); max-width: 680px; }
  .instructions { margin-bottom: 32px; padding: 16px 20px; background: #fef9fa; border: 1px solid #f0dde1; border-radius: 10px; font-size: 13px; color: #6b5860; line-height: 1.6; }
  .instructions strong { color: #1a1a1a; }
  .instructions ol { margin: 8px 0 0; padding-left: 20px; }
  hr.sep { border: none; border-top: 1px dashed #e0d5d8; margin: 24px 0; }
</style>
</head>
<body>
<div class="wrapper">

  <div style="display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 28px;">
    <div class="instructions" style="margin-bottom: 0; flex: 1;">
      <strong>How to install:</strong> Click "Copy Signature" → Open Gmail → Settings → Signature → Paste
    </div>
    <button id="copyBtn" onclick="copySignature()" style="flex-shrink: 0; padding: 12px 24px; background: linear-gradient(135deg,#c47d8e,#8b5e6b); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; transition: transform .15s, box-shadow .15s;" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 16px rgba(196,125,142,.35)'" onmouseout="this.style.transform='';this.style.boxShadow=''">Copy Signature</button>
  </div>

  <hr class="sep">

  <!-- ============ START SIGNATURE ============ -->
  <div id="sig">
  <table cellpadding="0" cellspacing="0" border="0" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; color: #2a2a2a; font-size: 14px; line-height: 1.45; border-collapse: collapse; max-width: 520px;">
    <tr>
      <!-- Photo -->
      <td valign="top" style="padding-right: 20px;">
        <a href="https://nitro.ng" style="text-decoration: none;">
          <img src="https://nitro.ng/team/adonai.jpg" alt="Adonai Jonathan" width="100" height="100" style="display: block; width: 100px; height: 100px; border-radius: 50%; border: 2.5px solid #c47d8e; object-fit: cover;" />
        </a>
      </td>

      <!-- Accent bar + details -->
      <td valign="top" style="border-left: 2.5px solid #c47d8e; padding-left: 20px;">

        <!-- Name -->
        <div style="font-family: Georgia, 'Times New Roman', serif; font-size: 22px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.3px; line-height: 1.1; margin: 0;">Adonai Jonathan</div>

        <!-- Title -->
        <div style="font-size: 11px; color: #c47d8e; font-weight: 700; margin-top: 5px; text-transform: uppercase; letter-spacing: 1.8px; line-height: 1;">Founder</div>

        <!-- Spacer -->
        <div style="height: 12px; line-height: 12px; font-size: 1px;">&nbsp;</div>

        <!-- Social icons (hosted PNGs for Gmail compatibility) -->
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse;">
          <tr>
            <td style="padding-right: 8px; line-height: 0;">
              <a href="https://nitro.ng" style="text-decoration: none; display: inline-block;" title="nitro.ng">
                <img src="https://nitro.ng/team/icons/globe.png" alt="Website" width="20" height="20" style="display: block; width: 20px; height: 20px;" />
              </a>
            </td>
            <td style="padding-right: 8px; line-height: 0;">
              <a href="https://instagram.com/nitro.ng" style="text-decoration: none; display: inline-block;" title="Instagram">
                <img src="https://nitro.ng/team/icons/instagram.png" alt="Instagram" width="20" height="20" style="display: block; width: 20px; height: 20px;" />
              </a>
            </td>
            <td style="line-height: 0;">
              <a href="https://x.com/thenitrong" style="text-decoration: none; display: inline-block;" title="X">
                <img src="https://nitro.ng/team/icons/x.png" alt="X" width="20" height="20" style="display: block; width: 20px; height: 20px;" />
              </a>
            </td>
          </tr>
        </table>

        <!-- Spacer -->
        <div style="height: 12px; line-height: 12px; font-size: 1px;">&nbsp;</div>

        <!-- Tagline -->
        <div style="font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 13px; color: #b0a09a; letter-spacing: 0.15px; line-height: 1.3;">&ldquo;Your social media deserves better numbers.&rdquo;</div>

      </td>
    </tr>
  </table>

  </div>
  <!-- ============ END SIGNATURE ============ -->

  <hr class="sep">
  <div style="font-size: 11px; color: #aaa; text-align: center;">The Nitro NG — <a href="https://nitro.ng" style="color: #c47d8e; text-decoration: none;">nitro.ng</a></div>

</div>
<script>
function copySignature() {
  var sig = document.getElementById('sig');
  var range = document.createRange();
  range.selectNodeContents(sig);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  document.execCommand('copy');
  sel.removeAllRanges();
  var btn = document.getElementById('copyBtn');
  btn.textContent = 'Copied!';
  btn.style.background = '#5a9a6a';
  setTimeout(function() { btn.textContent = 'Copy Signature'; btn.style.background = 'linear-gradient(135deg,#c47d8e,#8b5e6b)'; }, 2000);
}
</script>
</body>
</html>
