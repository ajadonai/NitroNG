name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx vitest run
      - run: npx next build
        env:
          JWT_SECRET: ci-build-only-user-secret-not-for-runtime
          JWT_ADMIN_SECRET: ci-build-only-admin-secret-not-for-runtime
